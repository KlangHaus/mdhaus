name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            arch: aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            arch: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Optional: add APPLE_* secrets for signed + notarized builds (see README).
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: open mdHaus ${{ github.ref_name }}
          releaseBody: |
            macOS builds for Apple Silicon (aarch64) and Intel (x64).

            ### Homebrew

            ```bash
            brew tap klanghaus/tap
            brew install --cask open-mdhaus
            ```

            Or download the `.dmg` below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Print DMG checksum (for Homebrew cask)
        if: success()
        run: |
          DMG=$(find src-tauri/target -path '*/bundle/dmg/*.dmg' | head -1)
          if [[ -z "$DMG" ]]; then
            echo "No DMG found under src-tauri/target" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "### ${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$(basename "$DMG")\`" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          shasum -a 256 "$DMG" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
